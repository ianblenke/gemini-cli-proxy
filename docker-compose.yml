services:
  gemini-cli-proxy:
    build: .
    container_name: gemini-cli-proxy
    user: "1000:1000"
    restart: always
    ports:
      - "${PORT}:4000"
    volumes:
      - ${GEMINI_CONFIG_PATH}:/home/node/.gemini
    environment:
      - PORT=4000
      - HOME=/home/node
      - PROXY_API_KEY=${PROXY_API_KEY:-}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - RATE_LIMIT=${RATE_LIMIT:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
